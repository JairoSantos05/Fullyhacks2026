<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Submerge</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000d1a" />
  <link rel="apple-touch-icon" href="assets/cute-diver-floating-with-submarine-balloon-cartoon-vector-icon-illustration-science-transportation_138676-9379.png" />
  <meta name="apple-mobile-web-app-title" content="Submerge">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Super Water';
      src: url('assets/SuperWater-PVoOm.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00eeff;
      --cyan-dim: rgba(0,238,255,0.15);
      --cyan-glow: rgba(0,238,255,0.35);
      --white: #ffffff;
      --white-muted: rgba(255,255,255,0.55);
      --red-dim: rgba(255,80,80,0.18);
      --red-border: rgba(255,80,80,0.35);
      --red-text: rgba(255,130,130,0.9);
      --radius: 14px;
      --radius-sm: 8px;
      --title-font: 'Super Water', cursive;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: #000d1a;
      font-family: var(--title-font);
      color: var(--white);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    #ocean-bg { position: fixed; inset: 0; transition: background 2s ease; z-index: 0; }

    #caustics { display: none; }
    .ray { display: none; }
    .bubble { display: none; }
    .ray {
      position: absolute; top: -40px; width: 2px; height: 160px;
      background: linear-gradient(180deg, rgba(0,238,255,0.18) 0%, transparent 100%);
      transform-origin: top center; animation: sway linear infinite; border-radius: 1px;
    }
    @keyframes sway {
      0%   { transform: rotate(var(--r0)) scaleY(1); opacity: var(--op); }
      50%  { transform: rotate(var(--r1)) scaleY(1.15); opacity: calc(var(--op) * 0.6); }
      100% { transform: rotate(var(--r0)) scaleY(1); opacity: var(--op); }
    }

    .bubble {
      position: fixed; border-radius: 50%; border: 1px solid rgba(0,238,255,0.4);
      background: rgba(0,238,255,0.06); animation: bubble-rise linear infinite; pointer-events: none; z-index: 1;
    }
    @keyframes bubble-rise {
      0%   { transform: translateY(0) translateX(0); opacity: 0.7; }
      100% { transform: translateY(-110vh) translateX(var(--dx)); opacity: 0; }
    }

    #app {
      position: relative; z-index: 2; height: 100vh; display: flex;
      flex-direction: column; max-width: 480px; margin: 0 auto; padding: 0 16px;
    }

    #hud { display: flex; justify-content: center; align-items: flex-start; padding: 44px 0 12px; flex-shrink: 0; }
    #depth-block { display: none; }
    #depth-num {
      font-family: var(--title-font); font-size: 52px; line-height: 1; color: var(--cyan);
      text-shadow: 0 0 24px var(--cyan-glow), 0 0 60px rgba(0,238,255,0.15); letter-spacing: -2px;
    }
    #depth-unit { font-size: 12px; color: var(--white-muted); font-family: var(--title-font); letter-spacing: 2px; text-transform: uppercase; }

    #right-hud { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    #zone-pill {
      background: transparent; border: none;
      padding: 8px 20px; font-size: 20px; color: var(--cyan); font-family: var(--title-font); letter-spacing: 0.5px; text-align: center;
      text-shadow: 0 0 20px var(--cyan-glow), 0 0 40px rgba(0,238,255,0.2); font-weight: 700;
    }
    #streak-block { display: none; }
    #streak-num { font-family: var(--title-font); font-size: 24px; color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.4); line-height: 1; }
    #streak-label { font-size: 10px; color: var(--white-muted); letter-spacing: 2px; text-transform: uppercase; }

    #ocean-viewport { flex-shrink: 0; height: 200px; position: relative; display: flex; align-items: center; justify-content: center; }

    /* old #sub-wrap positioning moved to #sub-diver */
    @keyframes sub-roam { 0%,100% { transform: translateX(-40px) translateY(0) rotate(-1deg); } 25% { transform: translateX(-20px) translateY(-6px) rotate(0.5deg); } 50% { transform: translateX(40px) translateY(-4px) rotate(1deg); } 75% { transform: translateX(20px) translateY(-6px) rotate(-0.5deg); } }
    #sub-svg { filter: drop-shadow(0 0 10px var(--cyan-glow)) drop-shadow(0 4px 16px rgba(0,0,0,0.5)); }
    #propeller { animation: spin 0.4s linear infinite; transform-origin: 66px 24px; }
    @keyframes spin { to { transform: rotate(360deg); transform-origin: 66px 24px; } }

    @keyframes spin { to { transform: rotate(360deg); transform-origin: 66px 24px; } }


    #creature {
      position: absolute; right: 32px; bottom: 32px; font-size: 48px;
      animation: creature-float 3.5s ease-in-out infinite; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
      transition: all 1.5s ease; line-height: 1; pointer-events: none;
    }
    @keyframes creature-float { 0%,100% { transform: translateY(0) rotate(-4deg) scaleX(-1); } 50% { transform: translateY(-14px) rotate(4deg) scaleX(-1); } }

    #roaming-animals {
      position: absolute; inset: 0; pointer-events: none;
    }
    .roaming-animal {
      position: absolute; font-size: 32px; line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
      animation: animal-roam ease-in-out infinite;
    }
    @keyframes animal-roam { 0%,100% { transform: translateX(0) translateY(0); } 25% { transform: translateX(calc(var(--tx) * 0.3)) translateY(calc(var(--ty) * 0.3)); } 50% { transform: translateX(var(--tx)) translateY(var(--ty)); } 75% { transform: translateX(calc(var(--tx) * 0.3)) translateY(calc(var(--ty) * 0.3)); } }

    #seafloor {
      position: absolute; bottom: 0; left: -16px; right: -16px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,238,255,0.2) 30%, rgba(0,238,255,0.2) 70%, transparent); pointer-events: none;
    }

    #xp-section { flex-shrink: 0; padding: 4px 0 10px; }
    #xp-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    #xp-fill {
      height: 100%; background: linear-gradient(90deg, #0066ff, var(--cyan));
      border-radius: 2px; transition: width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 8px var(--cyan-glow);
    }
    #xp-labels { display: flex; justify-content: space-between; margin-top: 5px; }
    #xp-labels span { font-size: 16px; color: var(--white-muted); font-family: var(--title-font); }




    #msg-bar {
      flex-shrink: 0; text-align: center; font-size: 18px; color: rgba(0,238,255,0.7);
      font-style: italic; min-height: 28px; padding: 0 8px 8px; line-height: 1.5; pointer-events: none;
    }

    #task-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow: hidden; padding-bottom: 32px; }

    #input-row { display: flex; gap: 8px; flex-shrink: 0; }
    #task-input {
      flex: 1; background: rgba(0,0,0,0.5); border: 0.5px solid rgba(255,255,255,0.15); border-radius: var(--radius-sm);
      color: var(--white); font-family: var(--title-font); font-size: 16px; padding: 13px 14px; outline: none;
      transition: border-color 0.2s; -webkit-appearance: none; appearance: none; touch-action: manipulation;
    }
    #task-input::placeholder { color: rgba(255,255,255,0.25); }
    #task-input:focus { border-color: rgba(0,238,255,0.45); box-shadow: 0 0 0 3px rgba(0,238,255,0.08); }

    #mode-toggle {
      display: flex; gap: 2px; background: rgba(0,0,0,0.3); border-radius: 6px; padding: 2px;
      flex-shrink: 0;
    }
    .mode-btn {
      background: transparent; border: none; color: rgba(255,255,255,0.5); font-size: 11px;
      font-weight: 600; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-family: var(--title-font);
      touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none;
      -webkit-user-select: none; transition: all 0.2s;
    }
    .mode-btn.active { background: rgba(0,238,255,0.2); color: #00eeff; }

    #add-btn {
      width: 52px; height: 52px; min-width: 52px; background: var(--cyan-dim); border: 0.5px solid rgba(0,238,255,0.4);
      border-radius: var(--radius-sm); color: var(--cyan); font-size: 28px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;
    }
    #add-btn:active { background: rgba(0,238,255,0.35); transform: scale(0.92); }

    #task-list {
      flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column;
      gap: 6px; scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    #task-list::-webkit-scrollbar { display: none; }

    #empty-state { text-align: center; color: rgba(255,255,255,0.2); font-size: 13px; padding: 28px 0; font-style: italic; line-height: 1.7; }

    .task-item {
      display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.38); border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm); padding: 13px 12px; cursor: pointer; animation: task-in 0.25s ease;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; min-height: 54px;
      flex-shrink: 0;
    }
    @keyframes task-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .task-item:active:not(.done) { background: rgba(0,0,0,0.6); border-color: rgba(0,238,255,0.4); }
    .task-item.done { opacity: 0.38; pointer-events: none; }

    .task-check {
      width: 22px; height: 22px; border-radius: 5px; border: 1.5px solid rgba(0,238,255,0.45); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 12px; color: #001a33; font-weight: 700;
    }
    .task-item.done .task-check { background: var(--cyan); border-color: var(--cyan); }
    .task-text { flex: 1; font-size: 14px; color: rgba(255,255,255,0.88); line-height: 1.35; font-family: var(--title-font); }
    .task-item.done .task-text { text-decoration: line-through; color: rgba(255,255,255,0.3); }

    .miss-btn {
      background: var(--red-dim); border: 0.5px solid var(--red-border); color: var(--red-text); border-radius: 6px;
      padding: 7px 11px; font-size: 12px; cursor: pointer; flex-shrink: 0; font-family: var(--title-font); touch-action: manipulation;
      -webkit-tap-highlight-color: transparent; min-height: 34px; display: flex; align-items: center; user-select: none; -webkit-user-select: none;
    }
    .miss-btn:active { background: rgba(255,80,80,0.35); }

    .delete-btn {
      background: transparent; border: none; color: rgba(255,255,255,0.3); font-size: 16px;
      cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center;
      transition: color 0.2s; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .delete-btn:hover, .delete-btn:active { color: var(--red-text); }

    .task-item.hierarchical { flex-direction: column; align-items: stretch; gap: 0; }
    .task-header { display: flex; align-items: center; gap: 10px; width: 100%; }
    .task-expand-btn {
      width: 22px; height: 22px; min-width: 22px; border: none; background: transparent;
      color: var(--cyan); font-size: 14px; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .task-expand-btn.expanded { transform: rotate(90deg); }
    .task-progress-bar {
      height: 3px; background: rgba(0,238,255,0.15); border-radius: 1.5px; margin: 8px 0;
      overflow: hidden; flex: 1;
    }
    .task-progress-fill {
      height: 100%; background: linear-gradient(90deg, #0066ff, var(--cyan));
      border-radius: 1.5px; transition: width 0.3s ease;
    }
    .task-progress-text {
      font-size: 11px; color: var(--white-muted); font-family: var(--title-font); white-space: nowrap;
      margin-left: auto; padding-left: 8px;
    }

    .subtasks-container {
      display: none; flex-direction: column; gap: 4px; margin-top: 8px; padding-top: 8px;
      border-top: 0.5px solid rgba(0,238,255,0.15);
    }
    .subtasks-container.visible { display: flex; }

    .subtask-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: rgba(0,238,255,0.05);
      border-radius: 6px; cursor: pointer; animation: task-in 0.2s ease; transition: background 0.2s;
    }
    .subtask-item:active:not(.done) { background: rgba(0,238,255,0.15); }
    .subtask-item.done { opacity: 0.4; pointer-events: none; }

    .subtask-check {
      width: 18px; height: 18px; border-radius: 4px; border: 1.2px solid rgba(0,238,255,0.35);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
      font-size: 10px; color: #001a33; font-weight: 700;
    }
    .subtask-item.done .subtask-check { background: var(--cyan); border-color: var(--cyan); }

    .subtask-text {
      flex: 1; font-size: 12px; color: rgba(255,255,255,0.75); line-height: 1.3; font-family: var(--title-font);
    }
    .subtask-item.done .subtask-text { text-decoration: line-through; color: rgba(255,255,255,0.25); }

    .subtask-miss-btn {
      background: transparent; border: 0.5px solid rgba(255,80,80,0.25); color: rgba(255,130,130,0.7);
      border-radius: 4px; padding: 4px 8px; font-size: 10px; cursor: pointer; flex-shrink: 0;
      font-family: var(--title-font); touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      min-height: 26px; display: flex; align-items: center; user-select: none; -webkit-user-select: none;
    }
    .subtask-miss-btn:active { background: rgba(255,80,80,0.15); }

    #xp-popup {
      position: fixed; font-family: var(--title-font); font-size: 20px; color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan-glow); pointer-events: none; opacity: 0; z-index: 100;
      left: 50%; top: 45%; transform: translateX(-50%) translateY(0);
    }
    #zone-flash { position: fixed; inset: 0; background: var(--cyan); opacity: 0; pointer-events: none; z-index: 50; transition: opacity 0.2s; }

    @media (max-height: 700px) {
      #depth-num { font-size: 38px; } #ocean-viewport { height: 140px; } #creature { font-size: 34px; } #hud { padding-top: 28px; }
    }
    /* ── EGG ANIMATION SYSTEM ── */
    #egg-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0, 13, 26, 0.85); z-index: 200; pointer-events: none; }
    #egg-overlay.show { display: flex; }
    #egg-container { position: relative; font-size: 140px; line-height: 1; filter: drop-shadow(0 0 30px rgba(0, 238, 255, 0.4)); }
    #egg-container.stage-appear { animation: egg-appear 0.6s ease-out forwards; }
    #egg-container.stage-shake { animation: egg-shake 1.2s ease-in-out infinite; }
    #egg-container.stage-crack { animation: egg-crack 0.5s ease-in-out forwards; }
    @keyframes egg-appear { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }
    @keyframes egg-shake { 0%, 100% { transform: translateX(0) rotate(0deg); } 25% { transform: translateX(-8px) rotate(-2deg); } 50% { transform: translateX(8px) rotate(2deg); } 75% { transform: translateX(-4px) rotate(-1deg); } }
    @keyframes egg-crack { 0% { opacity: 1; transform: scale(1) rotate(0deg); } 50% { transform: scale(1.05) rotate(-3deg); } 100% { opacity: 0; transform: scale(0.8) rotate(0deg); } }

    /* ── ANIMAL REVEAL OVERLAY ── */
    #animal-reveal-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0, 13, 26, 0.9); z-index: 199; pointer-events: none; }
    #animal-reveal-overlay.show { display: flex; }
    #revealed-animal-container { position: relative; text-align: center; }
    #revealed-animal-emoji { font-size: 120px; line-height: 1; filter: drop-shadow(0 0 40px rgba(0, 238, 255, 0.6)); animation: creature-reveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; margin-bottom: 16px; }
    #revealed-animal-name { font-family: var(--title-font); font-size: 22px; color: var(--cyan); text-shadow: 0 0 20px var(--cyan-glow); animation: name-reveal 0.6s ease-out 0.3s forwards; opacity: 0; letter-spacing: 1px; }
    @keyframes creature-reveal { from { opacity: 0; transform: scale(0.5) translateY(40px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes name-reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    #zone-unlock-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-family: var(--title-font); font-size: 18px; color: var(--cyan); opacity: 0; z-index: 1; text-shadow: 0 0 10px var(--cyan-glow); }
    #zone-unlock-text.show { animation: text-reveal 0.8s ease-in-out 1.8s forwards; }
    @keyframes text-reveal { from { opacity: 0; transform: translate(-50%, -50%) translateY(20px); } to { opacity: 1; transform: translate(-50%, -50%) translateY(0); } }

    /* ── HUD LAYOUT ── */
    #hud { display: flex; flex-direction: column; align-items: center; padding: 32px 16px 12px; flex-shrink: 0; gap: 4px; }
    #app-title { font-family: var(--title-font); font-size: 72px; font-weight: normal; color: var(--cyan); text-shadow: 0 0 24px var(--cyan-glow), 0 0 60px rgba(0,238,255,0.15); letter-spacing: 4px; margin: 0 0 4px 0; line-height: 1; }
    #zone-header { text-align: center; margin-bottom: 4px; }
    #streak-block { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 6px; margin-top: 2px; }
    #streak-num { font-family: var(--title-font); font-size: 12px; color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.4); font-weight: 600; }
    #streak-label { font-size: 9px; color: var(--white-muted); letter-spacing: 1px; text-transform: uppercase; }
    #button-row { display: flex; flex-direction: row; gap: 8px; justify-content: center; margin-top: 6px; }
    .hud-btn { font-family: var(--title-font); font-size: 10px; font-weight: 600; padding: 6px 14px; border-radius: 6px; cursor: pointer; border: 0.5px solid; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
    .ping-btn { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
    .reset-btn { background: var(--red-dim); border-color: var(--red-border); color: var(--red-text); }
    /* ── SUB DIVE ANIMATION ── */
    #sub-diver {
      position: absolute;
      display: flex; justify-content: center; width: 100%;
      pointer-events: none;
    }
    #sub-diver.diving {
      animation: sub-dive 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes sub-dive {
      0%   { transform: translateY(0px); }
      30%  { transform: translateY(28px); }
      65%  { transform: translateY(14px); }
      100% { transform: translateY(0px); }
    }
    #sub-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      animation: sub-roam 12s ease-in-out infinite;
      pointer-events: none;
    }
    /* ── SYNC STATUS PILL ── */
    #sync-pill {
      position: fixed; bottom: 12px; right: 12px; z-index: 50;
      font-size: 10px; padding: 4px 10px; border-radius: 20px;
      border: 0.5px solid; pointer-events: none;
      transition: all 0.4s ease; opacity: 0.85;
      font-family: var(--title-font);
    }
    #sync-pill.synced { background: rgba(0,255,120,0.12); border-color: rgba(0,255,120,0.5); color: rgba(0,255,180,0.9); }
    #sync-pill.offline { background: rgba(255,80,80,0.12); border-color: rgba(255,80,80,0.4); color: rgba(255,130,130,0.9); }
    #sync-pill.saving { background: rgba(0,238,255,0.1); border-color: rgba(0,238,255,0.35); color: rgba(0,238,255,0.8); }

    /* ── LEADERBOARD ── */
    #leaderboard-btn {
      position: fixed; bottom: 12px; left: 12px; z-index: 50;
      background: var(--cyan-dim); border: 0.5px solid var(--cyan); color: var(--cyan);
      font-size: 10px; padding: 5px 12px; border-radius: 20px;
      cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    #leaderboard-panel {
      position: fixed; bottom: 44px; left: 12px; z-index: 51;
      background: rgba(0,13,26,0.95); border: 0.5px solid rgba(0,238,255,0.3);
      border-radius: 12px; padding: 14px 16px; min-width: 200px; max-width: 260px;
      display: none; backdrop-filter: blur(10px);
    }
    #leaderboard-panel.open { display: block; }
    #leaderboard-panel h3 { font-family: var(--title-font); font-size: 14px; color: var(--cyan); margin-bottom: 10px; letter-spacing: 1px; }
    .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid rgba(255,255,255,0.06); font-size: 11px; }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { color: rgba(255,255,255,0.4); width: 20px; font-family: var(--title-font); }
    .lb-name { flex: 1; color: var(--white); font-family: var(--title-font); }
    .lb-name.me { color: var(--cyan); }
    .lb-xp { color: var(--cyan); font-family: var(--title-font); font-size: 10px; }
    .lb-streak { color: #ffd700; font-size: 9px; margin-left: 6px; font-family: var(--title-font); }

    /* ── PARTICLE BURST ── */
    .xp-particle {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 100;
      width: 6px; height: 6px;
      animation: particle-fly var(--dur) ease-out forwards;
    }
    @keyframes particle-fly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* ── CELEBRATION SCREEN ── */
    #celebration-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,13,26,0.96); display: none;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; pointer-events: none;
    }
    #celebration-overlay.show { display: flex; pointer-events: all; }
    #celebration-title {
      font-family: var(--title-font); font-size: 56px; color: var(--cyan);
      text-shadow: 0 0 30px var(--cyan-glow), 0 0 80px rgba(0,238,255,0.2);
      letter-spacing: 4px; animation: cele-pulse 2s ease-in-out infinite alternate;
      line-height: 1.1;
    }
    #celebration-sub {
      font-family: var(--title-font); font-size: 16px; color: rgba(255,255,255,0.6);
      margin-top: 12px; letter-spacing: 2px;
    }
    #celebration-depth {
      font-family: var(--title-font); font-size: 28px; color: #ffd700;
      text-shadow: 0 0 16px rgba(255,215,0,0.4); margin-top: 16px;
    }
    #celebration-close {
      margin-top: 28px; font-family: var(--title-font); font-size: 12px;
      background: var(--cyan-dim); border: 0.5px solid var(--cyan); color: var(--cyan);
      padding: 10px 28px; border-radius: 8px; cursor: pointer; letter-spacing: 1px;
    }
    #cele-sub-anim {
      font-size: 80px; margin-bottom: 12px;
      animation: cele-sub-surface 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes cele-pulse {
      from { text-shadow: 0 0 20px var(--cyan-glow); }
      to   { text-shadow: 0 0 50px var(--cyan), 0 0 100px rgba(0,238,255,0.3); }
    }
    @keyframes cele-sub-surface {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

<div id="ocean-bg"></div>

<div id="app">

<button id="leaderboard-btn" onclick="toggleLeaderboard()">🌊 Divers</button>

<!-- Sync status -->
<div id="sync-pill">⬤ Offline</div>



<script src="adaptiveSystem.js"></script>
<script>
  // Use the motivation engine from adaptiveSystem.js (exposed as window.MotivationEngine)
  const { getMotivationMessage: getEngineMessage } = window.MotivationEngine;

  const ZONES = [
    { threshold: 0,    name: "Sunlight Zone", bg: "linear-gradient(180deg, #00528f 0%, #003d7a 60%, #002b5e 100%)", creature: "🐢" },
    { threshold: 100,  name: "Twilight Zone", bg: "linear-gradient(180deg, #002b5e 0%, #001a40 60%, #000d2b 100%)", creature: "🐙" },
    { threshold: 200,  name: "Midnight Zone", bg: "linear-gradient(180deg, #000d2b 0%, #000818 60%, #000210 100%)", creature: "🐋" },
    { threshold: 300,  name: "The Abyss",    bg: "linear-gradient(180deg, #000210 0%, #000008 60%, #000000 100%)", creature: "🦑" },
    { threshold: 400,  name: "Hadal Zone",   bg: "linear-gradient(180deg, #000000 0%, #020008 100%)",             creature: "🪼" }
  ];

  /* Zone gradient stop colors for smooth interpolation */
  const ZONE_COLORS = [
    ['#00528f','#003d7a','#002b5e'],
    ['#002b5e','#001a40','#000d2b'],
    ['#000d2b','#000818','#000210'],
    ['#000210','#000008','#000000'],
    ['#000000','#020008','#000000'],
  ];

  function hexToRgb(h) {
    const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16);
    return [r,g,b];
  }
  function lerpHex(a, b, t) {
    const ra=hexToRgb(a), rb=hexToRgb(b);
    return `rgb(${Math.round(ra[0]+(rb[0]-ra[0])*t)},${Math.round(ra[1]+(rb[1]-ra[1])*t)},${Math.round(ra[2]+(rb[2]-ra[2])*t)})`;
  }
  function computeDepthBackground() {
    const zi = getZoneIdx(), nz = ZONES[zi+1];
    if (!nz) return ZONES[zi].bg;
    const t = Math.min(1, (state.xp - ZONES[zi].threshold) / (nz.threshold - ZONES[zi].threshold));
    const c = ZONE_COLORS, cur = c[zi], nxt = c[zi+1];
    return `linear-gradient(180deg, ${lerpHex(cur[0],nxt[0],t)} 0%, ${lerpHex(cur[1],nxt[1],t)} 60%, ${lerpHex(cur[2],nxt[2],t)} 100%)`;
  }

  const ANIMALS_BY_ZONE = {
    0: { emoji: "🐟", name: "Fish" },
    1: { emoji: "🐙", name: "Octopus" },
    2: { emoji: "🐋", name: "Whale" },
    3: { emoji: "🦑", name: "Squid" },
    4: { emoji: "🪼", name: "Jellyfish" }
  };

  /* ── ENGINE STATE ── */
  let state = { 
    xp: 0, streak: 0, missed: 0, tasks: [], 
    lastZoneIdx: 0, previousLevel: 'Sunlight Zone', previousXp: 0,
    unlockedAnimals: [0],  // Start with zone 0 animals unlocked
    animalInstances: [],   // Track active roaming animals
    inputMode: 'task',     // 'task' or 'subtask'
    lastCreatedTaskId: null,
    eggAnimationActive: false,
    lastAnimatedZone: -1
  };

  function getZoneIdx() { let i = 0; for(let j=0; j<ZONES.length; j++) { if(state.xp >= ZONES[j].threshold) i = j; } return i; }
  function getZone() { return ZONES[getZoneIdx()]; }
  function getNextZone() { const i = getZoneIdx(); return ZONES[i+1] || null; }

  /* ── ROAMING ANIMALS SYSTEM ── */
  function spawnRoamingAnimals() {
    const container = document.getElementById('roaming-animals');
    container.innerHTML = '';
    state.animalInstances = [];
    
    // Spawn 1 animal per unlocked zone, positioned in upper portion
    for (const zoneIdx of state.unlockedAnimals) {
      const el = document.createElement('div');
      el.className = 'roaming-animal';
      el.textContent = ANIMALS_BY_ZONE[zoneIdx].emoji;
      
      // Spawn in upper half of viewport
      const x = Math.random() * 300 - 150;
      const y = Math.random() * 60 - 80;  // Upper portion, above message area
      el.style.left = (150 + x) + 'px';
      el.style.top = (60 + y) + 'px';
      
      const dirX = (Math.random() - 0.5) * 400;
      const dirY = (Math.random() - 0.5) * 150;
      const duration = 10 + Math.random() * 8;
      
      el.style.setProperty('--tx', dirX + 'px');
      el.style.setProperty('--ty', dirY + 'px');
      el.style.animationDuration = duration + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      
      container.appendChild(el);
      state.animalInstances.push({ el, zoneIdx, duration });
    }
  }

  /* ── ZONE PROGRESSION EGG ANIMATION ── */
  function startEggAnimation(zoneIdx) {
    if (state.eggAnimationActive || state.lastAnimatedZone === zoneIdx) return;
    state.eggAnimationActive = true;
    state.lastAnimatedZone = zoneIdx;
    
    const overlay = document.getElementById('egg-overlay');
    const eggContainer = document.getElementById('egg-container');
    const unlockText = document.getElementById('zone-unlock-text');
    const animalRevealOverlay = document.getElementById('animal-reveal-overlay');
    const revealedAnimalEmoji = document.getElementById('revealed-animal-emoji');
    const revealedAnimalName = document.getElementById('revealed-animal-name');
    
    overlay.classList.add('show');
    eggContainer.className = '';
    unlockText.className = '';
    
    setTimeout(() => { eggContainer.classList.add('stage-appear'); }, 50);
    setTimeout(() => { eggContainer.classList.remove('stage-appear'); eggContainer.classList.add('stage-shake'); }, 600);
    setTimeout(() => { eggContainer.classList.remove('stage-shake'); eggContainer.classList.add('stage-crack'); unlockText.classList.add('show'); }, 1800);
    setTimeout(() => { overlay.classList.remove('show'); }, 2300);
    
    // Reveal the newly unlocked animal
    const animal = ANIMALS_BY_ZONE[zoneIdx];
    setTimeout(() => {
      revealedAnimalEmoji.textContent = animal.emoji;
      revealedAnimalName.textContent = animal.name;
      animalRevealOverlay.classList.add('show');
    }, 2300);
    
    // Hide animal reveal and spawn roaming animals
    setTimeout(() => { animalRevealOverlay.classList.remove('show'); spawnRoamingAnimals(); state.eggAnimationActive = false; }, 3800);
  }

  function unlockAnimalForZone(zoneIdx) {
    if (!state.unlockedAnimals.includes(zoneIdx)) {
      state.unlockedAnimals.push(zoneIdx);
      startEggAnimation(zoneIdx);
    }
  }

  function checkZoneProgression() {
    const currentZone = getZoneIdx();
    if (currentZone !== state.lastZoneIdx) {
      unlockAnimalForZone(currentZone);
    }
  }

  /* ── PERSISTENCE ENGINE (Cloud + Local Cache) ── */
  let cloudUsername = localStorage.getItem('deepSeaUsername');

  function migrateState() {
      if (!state.tasks) state.tasks = [];
      if (!state.unlockedAnimals) state.unlockedAnimals = [0];
      if (!state.inputMode) state.inputMode = 'task';
      
      // Migrate old data format
      state.tasks = state.tasks.map(t => {
        if (t.text !== undefined) { t.title = t.text; delete t.text; }
        if (t.done !== undefined) { t.completed = t.done; delete t.done; }
        if (!t.subtasks) t.subtasks = [];
        return t;
      });
  }

  function setSyncPill(status) {
    const p = document.getElementById('sync-pill');
    if (!p) return;
    p.className = status;
    if (status === 'saving')  p.textContent = '⬤ Saving...';
    if (status === 'synced')  p.textContent = '⬤ Synced';
    if (status === 'offline') p.textContent = '⬤ Offline';
  }

  function saveState() {
    localStorage.setItem('deepSeaState', JSON.stringify(state));
    if (cloudUsername) {
      setSyncPill('saving');
      fetch(`/api/state/${cloudUsername}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state: state })
      }).then(() => setSyncPill('synced'))
        .catch(() => setSyncPill('offline'));
    } else {
      setSyncPill('offline');
    }
  }

  /* ── HAPTIC FEEDBACK ── */
  function haptic(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  /* ── ANIMATED DEPTH COUNTER ── */
  let _counterAnim = null;
  function animateCounter(fromVal, toVal, el, suffix, duration) {
    if (_counterAnim) cancelAnimationFrame(_counterAnim);
    const start = performance.now();
    const diff = toVal - fromVal;
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic
      el.textContent = Math.round(fromVal + diff * ease) + suffix;
      if (t < 1) _counterAnim = requestAnimationFrame(step);
    }
    _counterAnim = requestAnimationFrame(step);
  }

  /* ── PARTICLE BURST ── */
  function spawnParticleBurst(cx, cy, count, color) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'xp-particle';
      const angle = (i / count) * 2 * Math.PI + Math.random() * 0.5;
      const dist = 40 + Math.random() * 60;
      const tx = Math.cos(angle) * dist, ty = Math.sin(angle) * dist;
      const dur = (0.5 + Math.random() * 0.4).toFixed(2) + 's';
      const colors = color ? [color] : ['#00eeff','#00ffaa','#ffffff','#ffd700'];
      const c = colors[Math.floor(Math.random() * colors.length)];
      el.style.cssText = `left:${cx}px;top:${cy}px;background:${c};box-shadow:0 0 6px ${c};--tx:${tx.toFixed(1)}px;--ty:${ty.toFixed(1)}px;--dur:${dur};`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }
  }

  /* ── CELEBRATION SCREEN ── */
  function checkAllComplete() {
    if (!state.tasks.length) return;
    const allDone = state.tasks.every(t => t.completed);
    if (!allDone) return;
    const overlay = document.getElementById('celebration-overlay');
    document.getElementById('celebration-depth').textContent = `⬇ ${state.xp} Meters Deep`;
    overlay.classList.add('show');
    haptic([100, 50, 200, 50, 300]);
    spawnParticleBurst(window.innerWidth / 2, window.innerHeight / 2, 28, null);
  }

  /* ── LEADERBOARD ── */
  async function fetchLeaderboard() {
    try {
      const res = await fetch('/api/leaderboard');
      const data = await res.json();
      const rows = document.getElementById('lb-rows');
      if (!data.leaderboard || !data.leaderboard.length) {
        rows.innerHTML = '<div style="color:rgba(255,255,255,0.4);font-size:11px">No divers yet.</div>';
        return;
      }
      const medals = ['🥇','🥈','🥉'];
      rows.innerHTML = data.leaderboard.map((u, i) => `
        <div class="lb-row">
          <span class="lb-rank">${medals[i] || (i+1)}</span>
          <span class="lb-name${u.username === cloudUsername ? ' me' : ''}">${u.username}</span>
          <span class="lb-xp">${u.xp}m</span>
          <span class="lb-streak">🔥${u.streak}</span>
        </div>`).join('');
    } catch(e) {
      document.getElementById('lb-rows').innerHTML = '<div style="color:rgba(255,80,80,0.7);font-size:11px">Offline</div>';
    }
  }

  function toggleLeaderboard() {
    const panel = document.getElementById('leaderboard-panel');
    const isOpen = panel.classList.toggle('open');
    if (isOpen) fetchLeaderboard();
  }



  async function loadState() {
    if (!cloudUsername) {
      let promptName = prompt("Welcome to Submerge! Please enter a unique Username to save your progress in the cloud (or leave blank to play offline):", "");
      if (promptName && promptName.trim() !== "") {
        cloudUsername = promptName.trim();
        localStorage.setItem('deepSeaUsername', cloudUsername);
        
        // MIGRATION: Push existing local progress to cloud immediately
        const saved = localStorage.getItem('deepSeaState');
        if (saved) {
          const parsed = JSON.parse(saved);
          state = Object.assign({}, state, parsed);
          migrateState();
          
          await fetch(`/api/state/${cloudUsername}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ state: state })
          }).catch(e => console.log('Migration push failed', e));
          return;
        }
      }
    }
    
    if (cloudUsername) {
      try {
        const res = await fetch(`/api/state/${cloudUsername}`);
        const data = await res.json();
        if (data.state) {
          state = Object.assign({}, state, data.state);
          migrateState();
          localStorage.setItem('deepSeaState', JSON.stringify(state));
          return;
        }
      } catch (e) {
        console.log('Failed to fetch from cloud, falling back to local cache', e);
      }
    }
    
    // Fallback: Use local cache
    const saved = localStorage.getItem('deepSeaState');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = Object.assign({}, state, parsed);
      migrateState();
    }
  }

  /* ── DISCORD REMINDER ENGINE ── */
  const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1495329821566173216/5M8ALcxdM7LOL5TvSIFSOUcfQzNEYGj6nkk5KPZV6YeEFhLo1NFCgUMAJUJ6avHL2u-a";

  function pingDiscord() {
    if (state.tasks.length === 0) {
      showPopup("No goals to remind you of!");
      return;
    }
    const currentTask = state.tasks[0].title;
    const payload = { content: `👋 **Submarine Ping!** 🌊\nHey there! Just a friendly reminder to keep diving deep! Your current target is: **${currentTask}**\nYou can do this! 💙\n\n*Current Depth: ${state.xp}m | Streak: 🔥 ${state.streak}*` };
    fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
      .then(() => showPopup("Ping Sent!"))
      .catch(err => showPopup("Ping Failed!"));
  }

  async function resetProgress() {
    if (confirm("Are you sure you want to completely RESET all your progress? This will delete all goals, streak, and depth, and cannot be undone.")) {
      localStorage.removeItem('deepSeaState');
      if (cloudUsername) {
        try {
          await fetch(`/api/state/${cloudUsername}`, { method: 'DELETE' });
        } catch (e) { console.log('Cloud delete failed'); }
      }
      location.reload();
    }
  }

  /* ── ADAPTIVE BEHAVIOR ENGINE (using adaptiveSystem.js) ── */
  function getMotivationMessage() {
    // Create a state object compatible with the engine
    const engineState = {
      missedCount: state.missed,
      streak: state.streak,
      level: getZone().name,
      previousLevel: state.previousLevel,
      points: state.xp,
      previousPoints: state.previousXp
    };
    
    return getEngineMessage(engineState);
  }

  /* ── SUB DIVE ── */
  let _lastXpRendered = 0;
  function triggerSubDive() {
    const diver = document.getElementById('sub-diver');
    if (!diver) return;
    diver.classList.remove('diving');
    void diver.offsetWidth; // force reflow to restart animation
    diver.classList.add('diving');
    setTimeout(() => diver.classList.remove('diving'), 1400);
  }

  /* ── EFFECTS ── */
  function spawnBubbles() {
    document.querySelectorAll('.bubble').forEach(b => b.remove());
    const count = Math.max(2, 10 - getZoneIdx() * 2);
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div'); el.className = 'bubble';
      const size = 3 + Math.random() * 9, dur = 5 + Math.random() * 7, dx = ((Math.random() - 0.5) * 50) + 'px';
      el.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:${Math.random()*30}%;--dx:${dx};animation-duration:${dur}s;animation-delay:${Math.random()*dur}s;`;
      document.body.appendChild(el);
    }
  }

  function spawnRays() {
    const c = document.getElementById('caustics'); c.innerHTML = '';
    for (let i = 0; i < 14; i++) {
      const el = document.createElement('div'); el.className = 'ray';
      const r0 = (Math.random()*30-15)+'deg', r1 = (Math.random()*30-15)+'deg', op = (0.3+Math.random()*0.5).toFixed(2);
      el.style.cssText = `left:${Math.random()*100}%;height:${100+Math.random()*100}px;--r0:${r0};--r1:${r1};--op:${op};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
      c.appendChild(el);
    }
  }


  let popTimer = null;
  function showPopup(text) {
    const el = document.getElementById('xp-popup'); el.textContent = text;
    el.style.transition = 'none'; el.style.opacity = '0'; el.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(popTimer);
    requestAnimationFrame(() => { requestAnimationFrame(() => {
      el.style.transition = 'opacity 0.3s, transform 0.8s ease-out'; el.style.opacity = '1';
      el.style.transform = 'translateX(-50%) translateY(-40px)';
      popTimer = setTimeout(() => { el.style.opacity = '0'; }, 900);
    }); });
  }

  function zoneFlash() {
    const el = document.getElementById('zone-flash'); el.style.transition = 'none'; el.style.opacity = '0.12';
    setTimeout(() => { el.style.transition = 'opacity 0.6s ease'; el.style.opacity = '0'; }, 60);
  }

  /* ── UI SYNC ── */
  function updateUI(msg) {
    const zi = getZoneIdx(), zone = getZone(), nz = getNextZone();

    document.getElementById('ocean-bg').style.background = computeDepthBackground();
    document.getElementById('caustics').style.opacity = Math.max(0, 1 - zi * 0.28).toFixed(2);
    const depthNumEl = document.getElementById('depth-num');
    if (depthNumEl) depthNumEl.textContent = state.xp;
    document.getElementById('zone-pill').textContent = zone.name;
    document.getElementById('streak-num').textContent = state.streak;

    // Trigger sub dive animation on XP gain
    if (state.xp > _lastXpRendered) { triggerSubDive(); }
    _lastXpRendered = state.xp;

    // Check for zone progression and unlock new animals
    checkZoneProgression();

    if (zi !== state.lastZoneIdx) { zoneFlash(); spawnBubbles(); state.lastZoneIdx = zi; }

    const pct = nz ? Math.min(100, Math.round(((state.xp - zone.threshold) / (nz.threshold - zone.threshold)) * 100)) : 100;
    document.getElementById('xp-fill').style.width = pct + '%';
    // Animated depth counter
    const xpCurEl = document.getElementById('xp-cur');
    const prevXpDisplay = parseInt(xpCurEl.textContent) || 0;
    if (prevXpDisplay !== state.xp) {
      animateCounter(prevXpDisplay, state.xp, xpCurEl, ' Meters', 800);
    }
    document.getElementById('xp-next').textContent = nz ? 'Next zone: ' + nz.threshold + ' Meters' : 'MAX DEPTH REACHED';
    
    if (msg) document.getElementById('msg-bar').textContent = msg;
    renderTasks();
    saveState();
  }

  /* ── RENDER TASKS ── */
  function renderTasks() {
    const list = document.getElementById('task-list');
    if (state.tasks.length === 0) {
      list.innerHTML = '<div id="empty-state">No goals yet.<br>Every task is a meter deeper.</div>';
      return;
    }
    list.innerHTML = '';
    
    for (const task of state.tasks) {
      const el = document.createElement('div');
      el.className = 'task-item' + (task.completed ? ' done' : '') + (task.subtasks && task.subtasks.length > 0 ? ' hierarchical' : '');
      el.setAttribute('data-task-id', task.id);
      
      // Task header
      const header = document.createElement('div');
      header.className = 'task-header';
      
      // Expand button (only if has subtasks)
      if (task.subtasks && task.subtasks.length > 0) {
        const expandBtn = document.createElement('button');
        expandBtn.className = 'task-expand-btn';
        if (task.isExpanded) {
          expandBtn.classList.add('expanded');  // Show rotated arrow if expanded
        }
        expandBtn.textContent = '▶';
        expandBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleExpandTask(task.id); });
        header.appendChild(expandBtn);
      }
      
      // Checkbox
      const check = document.createElement('div');
      check.className = 'task-check';
      if (task.completed) check.textContent = '✓';
      header.appendChild(check);
      
      // Task text + progress
      const textContainer = document.createElement('div');
      textContainer.style.flex = '1';
      const txt = document.createElement('span');
      txt.className = 'task-text';
      txt.textContent = task.title;
      textContainer.appendChild(txt);
      
      // Progress bar (if has subtasks)
      if (task.subtasks && task.subtasks.length > 0) {
        const progress = window.MotivationEngine.getTaskProgress(task);
        const completed = task.subtasks.filter(st => st.completed).length;
        
        const progressContainer = document.createElement('div');
        progressContainer.style.display = 'flex';
        progressContainer.style.gap = '8px';
        progressContainer.style.marginTop = '4px';
        progressContainer.style.alignItems = 'center';
        
        const progressBar = document.createElement('div');
        progressBar.className = 'task-progress-bar';
        const progressFill = document.createElement('div');
        progressFill.className = 'task-progress-fill';
        progressFill.style.width = progress + '%';
        progressBar.appendChild(progressFill);
        
        const progressText = document.createElement('div');
        progressText.className = 'task-progress-text';
        progressText.textContent = `${completed}/${task.subtasks.length}`;
        
        progressContainer.appendChild(progressBar);
        progressContainer.appendChild(progressText);
        textContainer.appendChild(progressContainer);
      }
      
      header.appendChild(textContainer);
      
      header.addEventListener('click', (e) => {
        if (e.target.closest('.miss-btn') || e.target.closest('.delete-btn') || e.target.closest('.task-expand-btn')) return;
        toggleTaskCompletion(task.id);
      });
      
      // Miss button
      if (!task.completed) {
        const miss = document.createElement('button');
        miss.className = 'miss-btn';
        miss.textContent = task.subtasks && task.subtasks.length > 0 ? 'Collapse' : 'Missed';
        miss.addEventListener('touchend', function(e) { e.preventDefault(); e.stopPropagation(); 
          if (task.subtasks && task.subtasks.length > 0) {
            toggleTaskExpansion(task.id);
          } else {
            missTask(task.id);
          }
        }, { passive: false });
        miss.addEventListener('click', function(e) { e.stopPropagation(); 
          if (task.subtasks && task.subtasks.length > 0) {
            toggleTaskExpansion(task.id);
          } else {
            missTask(task.id);
          }
        });
        header.appendChild(miss);
      }
      
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerHTML = '&times;';
      delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteTask(task.id); });
      delBtn.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); deleteTask(task.id); }, { passive: false });
      header.appendChild(delBtn);

      el.appendChild(header);
      
      // Subtasks
      if (task.subtasks && task.subtasks.length > 0) {
        const subtasksContainer = document.createElement('div');
        subtasksContainer.className = 'subtasks-container';
        
        // Add 'visible' class if task is expanded
        if (task.isExpanded) {
          subtasksContainer.classList.add('visible');
        }
        
        for (const subtask of task.subtasks) {
          const subtaskEl = document.createElement('div');
          subtaskEl.className = 'subtask-item' + (subtask.completed ? ' done' : '');
          
          const stCheck = document.createElement('div');
          stCheck.className = 'subtask-check';
          if (subtask.completed) stCheck.textContent = '✓';
          subtaskEl.appendChild(stCheck);
          
          const stTxt = document.createElement('span');
          stTxt.className = 'subtask-text';
          stTxt.textContent = subtask.title;
          subtaskEl.appendChild(stTxt);
          
          if (!subtask.completed) {
            const stMiss = document.createElement('button');
            stMiss.className = 'subtask-miss-btn';
            stMiss.textContent = 'Skip';
            stMiss.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); handleSubtaskMiss(task.id, subtask.id); }, { passive: false });
            stMiss.addEventListener('click', (e) => { e.stopPropagation(); handleSubtaskMiss(task.id, subtask.id); });
            subtaskEl.appendChild(stMiss);
            
            subtaskEl.addEventListener('click', (e) => {
              if (e.target.closest('.subtask-miss-btn') || e.target.closest('.delete-btn')) return;
              handleSubtaskCompletion(task.id, subtask.id);
            });
          }
          
          const stDelBtn = document.createElement('button');
          stDelBtn.className = 'delete-btn';
          stDelBtn.innerHTML = '&times;';
          stDelBtn.style.fontSize = '14px';
          stDelBtn.addEventListener('click', (e) => { e.stopPropagation(); handleSubtaskDeletion(task.id, subtask.id); });
          stDelBtn.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); handleSubtaskDeletion(task.id, subtask.id); }, { passive: false });
          subtaskEl.appendChild(stDelBtn);

          subtasksContainer.appendChild(subtaskEl);
        }
        
        el.appendChild(subtasksContainer);
      }
      
      list.appendChild(el);
    }
  }

  /* ── ENGINE ACTIONS ── */
  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    
    if (state.inputMode === 'task') {
      // Create hierarchical task using engine
      const newTask = window.MotivationEngine.createTask(Date.now(), text, []);
      newTask.isExpanded = false;  // Initialize expansion state
      state.tasks.unshift(newTask);
      state.lastCreatedTaskId = newTask.id;
      input.value = '';
      updateUI('New goal locked in. Add steps or jump straight in.');
    } else if (state.inputMode === 'subtask') {
      // Add subtask to last created task
      if (!state.lastCreatedTaskId) {
        alert('Create a main task first before adding steps.');
        return;
      }
      
      const taskIdx = state.tasks.findIndex(x => x.id === state.lastCreatedTaskId);
      if (taskIdx === -1) return;
      
      const task = state.tasks[taskIdx];
      const newSubtaskId = task.subtasks.length + 1;
      const newSubtask = window.MotivationEngine.createSubtask(newSubtaskId, text);
      
      task.subtasks.push(newSubtask);
      task.isExpanded = true; // Auto-expand
      
      input.value = '';
      updateUI('Step added. Building momentum...');
    }
  }

  function toggleExpandTask(id) {
    const taskIdx = state.tasks.findIndex(x => x.id === id);
    if (taskIdx === -1) return;
    
    const task = state.tasks[taskIdx];
    task.isExpanded = !task.isExpanded;
    renderTasks();
  }

  function completeTask(id) {
    const taskIdx = state.tasks.findIndex(x => x.id === id);
    if (taskIdx === -1) return;
    
    const task = state.tasks[taskIdx];
    
    // For tasks with subtasks: can only complete if all subtasks are done
    if (task.subtasks && task.subtasks.length > 0) {
      const allSubtasksDone = task.subtasks.every(st => st.completed);
      if (!allSubtasksDone) {
        // Not all subtasks complete - show feedback but don't complete
        updateUI('Complete all steps to finish this goal.');
        return;
      }
    }
    
    // Complete the task
    state.previousXp = state.xp;
    state.xp += 50;
    state.streak += 1;
    state.missed = 0;
    
    const completedTask = { ...task, completed: true, isExpanded: false };
    state.tasks = state.tasks.filter((_, i) => i !== taskIdx);
    state.tasks.push(completedTask);
    
    showPopup('+50 Meters');
    haptic([30, 20, 80]); // big task haptic
    // Particle burst from center of screen
    spawnParticleBurst(window.innerWidth / 2, window.innerHeight * 0.55, 20, '#ffd700');
    updateUI(getMotivationMessage());
    checkAllComplete();
  }

  function toggleTaskCompletion(id) {
    completeTask(id);
  }

  function toggleTaskExpansion(id) {
    toggleExpandTask(id);
  }

  function handleSubtaskCompletion(taskId, subtaskId) {
    const taskIdx = state.tasks.findIndex(x => x.id === taskId);
    if (taskIdx === -1) return;
    
    const task = state.tasks[taskIdx];
    const result = window.MotivationEngine.completeSubtaskWithMotivation(
      task,
      subtaskId,
      {
        points: state.xp,
        streak: state.streak,
        missedCount: state.missed,
        level: getZone().name,
        previousLevel: state.previousLevel,
        previousPoints: state.previousXp
      }
    );
    
    // Update state
    state.previousXp = state.xp;
    state.tasks[taskIdx] = result.updatedTask;
    state.xp = result.motivationState.points;
    state.streak = result.motivationState.streak;
    state.missed = result.motivationState.missedCount;
    state.previousLevel = result.motivationState.previousLevel;
    
    showPopup(`+${result.reward} Meters`);
    haptic(result.isMainTaskComplete ? [30, 20, 80] : [20]);
    spawnParticleBurst(window.innerWidth / 2, window.innerHeight * 0.55,
      result.isMainTaskComplete ? 20 : 10,
      result.isMainTaskComplete ? '#ffd700' : '#00eeff');
    
    if (result.isMainTaskComplete) {
      // Move completed task to bottom
      const completedTask = state.tasks.splice(taskIdx, 1)[0];
      completedTask.isExpanded = false;
      state.tasks.push(completedTask);
    }
    
    updateUI(result.motivationState.message);
    checkAllComplete();
  }

  function handleSubtaskMiss(taskId, subtaskId) {
    const taskIdx = state.tasks.findIndex(x => x.id === taskId);
    if (taskIdx === -1) return;
    
    const task = state.tasks[taskIdx];
    const result = window.MotivationEngine.missSubtaskWithMotivation(
      task,
      subtaskId,
      {
        points: state.xp,
        streak: state.streak,
        missedCount: state.missed,
        level: getZone().name,
        previousLevel: state.previousLevel,
        previousPoints: state.previousXp
      }
    );
    
    // Update state
    state.previousXp = state.xp;
    state.xp = result.motivationState.points;
    state.streak = result.motivationState.streak;
    state.missed = result.motivationState.missedCount;
    
    updateUI(result.motivationState.message);
  }

  function missTask(id) {
    const taskIdx = state.tasks.findIndex(x => x.id === id);
    if (taskIdx === -1) return;
    
    const task = state.tasks[taskIdx];
    
    // If task has no subtasks, mark it as missed (reset streak)
    if (!task.subtasks || task.subtasks.length === 0) {
      state.previousXp = state.xp;
      state.streak = 0;
      state.missed += 1;
      
      updateUI(getMotivationMessage());
    } else {
      // For hierarchical tasks, "Collapse" button just toggles expand state
      toggleExpandTask(id);
    }
  }

  function deleteTask(id) {
    state.tasks = state.tasks.filter(x => x.id !== id);
    if (state.lastCreatedTaskId === id) state.lastCreatedTaskId = null;
    updateUI('Goal deleted.');
  }

  function handleSubtaskDeletion(taskId, subtaskId) {
    const taskIdx = state.tasks.findIndex(x => x.id === taskId);
    if (taskIdx === -1) return;
    const task = state.tasks[taskIdx];
    task.subtasks = task.subtasks.filter(x => x.id !== subtaskId);
    updateUI('Step deleted.');
  }

  /* ── BINDINGS ── */
  let addBtnLocked = false; 
  const addBtn = document.getElementById('add-btn');
  const modeTaskBtn = document.getElementById('mode-task');
  const modeStepBtn = document.getElementById('mode-step');
  
  // Mode toggle
  modeTaskBtn.addEventListener('click', () => {
    state.inputMode = 'task';
    modeTaskBtn.classList.add('active');
    modeStepBtn.classList.remove('active');
  });
  
  modeStepBtn.addEventListener('click', () => {
    state.inputMode = 'subtask';
    modeStepBtn.classList.add('active');
    modeTaskBtn.classList.remove('active');
  });
  
  // Add button
  addBtn.addEventListener('touchend', function(e) {
    e.preventDefault(); if (addBtnLocked) return; addBtnLocked = true; addTask(); setTimeout(() => { addBtnLocked = false; }, 400);
  }, { passive: false });
  addBtn.addEventListener('click', function() {
    if (addBtnLocked) return; addBtnLocked = true; addTask(); setTimeout(() => { addBtnLocked = false; }, 400);
  });

  const taskInput = document.getElementById('task-input');
  taskInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); addTask(); } });
  
  /* ── INIT ── */
  async function initApp() {
    await loadState();
    
    checkZoneProgression();
    renderTasks();
    
    spawnRays(); spawnBubbles(); spawnRoamingAnimals();
    
    // Initialize UI state
    if (state.inputMode === 'subtask') {
      document.getElementById('mode-step').classList.add('active');
      document.getElementById('mode-task').classList.remove('active');
    }
    
    if (cloudUsername) {
      updateUI(`Welcome back, ${cloudUsername}! Set your first goal below and start the dive...`);
    } else {
      updateUI('Set your first goal below and start the dive...');
    }
  }
  initApp();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW reg failed', err));
  }
</script>
</body>
</html>
